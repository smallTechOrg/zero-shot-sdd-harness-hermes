version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AGENT_GEMINI_API_KEY=${AGENT_GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
      
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
